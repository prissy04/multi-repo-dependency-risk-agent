# ── MULTI-REPO DEPENDENCY RISK AGENT — CONFIGURATION ──────────────────────
#
# HOW TO CONFIGURE THIS FOR YOUR ORGANIZATION
# ─────────────────────────────────────────────
# 1. Replace the repos under "repositories" with your own org's repos
#    Format is always: your-org-name/repo-name
#    Example: microsoft/azure-sdk or mycompany/payments-api
#
# 2. Update "dependency_labels" to match the labels your teams actually use
#    Check your GitHub repos under Issues → Labels to see what exists
#
# 3. Adjust "risk_thresholds" to match your program's delivery cadence
#    Shorter sprints = lower thresholds. Longer programs = higher thresholds
#
# 4. Update "report_repository" to your own agent repo so the
#    weekly report posts there as a GitHub Issue every Monday
#
# 5. Adjust "max_issues_per_repo" based on your org size
#    50-100 for testing, 200-500 for large organizations
#
# NOTE: The repos listed below are demo repos — replace with your own.
# ──────────────────────────────────────────────────────────────────────────


# Repositories to monitor (format: owner/repo-name)
# REPLACE THESE with your organization's repositories
# Example: your-org/auth-service, your-org/payments-api
repositories:
  - prissy04/multi-repo-dependency-risk-agent
  - prissy04/freelancer-risk-analyzer
  # ADD YOUR OWN REPOS BELOW
  # - your-org/repo-name


# Labels that signal a cross-team dependency issue
# REPLACE THESE with the labels your teams use in GitHub Issues
# Tip: go to any repo → Issues → Labels to see your existing labels
dependency_labels:
  - dependency
  - blocked
  - cross-team
  - waiting-on-external
  - blocker


# Risk scoring thresholds (in days)
# ADJUST based on your program's sprint cadence
# Example: 2-week sprints → set high_days_open to 10, medium to 5
risk_thresholds:
  high_days_open: 14        # Issues open longer than this = HIGH risk
  medium_days_open: 7       # Issues open longer than this = MEDIUM risk
  stale_days_no_update: 5   # No update in this many days = staleness flag


# Maximum issues to scan per repo
# Increase for larger organizations (may increase run time)
# Recommended: 50-100 for testing, 200-500 for production
max_issues_per_repo: 100


# Where the weekly report gets posted (as a GitHub Issue every Monday)
# REPLACE with your own agent repo name
# Format: your-github-username/your-repo-name
report_repository: prissy04/multi-repo-dependency-risk-agent
